output_dir: test/out
images: test/images

defaults:
  dataset:
    - large
    - simple

DATASETS:
  large:
    input:
      batch_analysis: test/input/blood_pca.zarr
    batch_analysis:
      covariates:
        - tech_id
        - donor_id
        - assay
        - sex
        - disease
        - self_reported_ethnicity
        # - development_stage
      permute_covariates:
        - donor_id
        - assay
        - sex
        - disease
        - self_reported_ethnicity
      n_permutations: 1000
      max_threads: 50
      sample: tech_id,donor_id
  
  simple:
    input:
      batch_analysis: test/input/blood_pca.zarr
    batch_analysis:
      covariates:
        - assay
      highly_variable_genes:
      pca:
      n_permutations: 10

  small:
    input:
      batch_analysis: test/input/pbmc68k.h5ad
    batch_analysis:
      sample: batch, bulk_labels
      n_permutations: 1000
      covariates:
        - bulk_labels
        - batch
        - is_cd14_mono
        - n_genes
        - n_counts
        - percent_mito
        - S_score
        - G2M_score
        - phase
      normalize:
      highly_variable_genes:
      pca: