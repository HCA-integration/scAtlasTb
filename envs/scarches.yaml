name: scarches
channels:
  - nvidia
  - pytorch
  - conda-forge
dependencies:
  - python=3.11
  - anndata=0.11
  - scanpy=1.11
  - zarr<3
  - pandas<3
  - dask
  - sparse
  - jax<=0.4.28
  # - cuda-version>12.1
  # - cuda-nvcc>12.1
  - pytorch>=2.2
  - jaxlib=*=*cuda*
  - pytorch-cuda=12.1
  - scvi-tools=1.3.0
  - pip
  - pip:
    - git+https://github.com/theislab/scarches.git@master
    - faiss-cpu<=1.9
    - patpy